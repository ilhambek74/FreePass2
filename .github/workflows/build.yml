name: Build FreePass APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android Project
        run: |
          mkdir -p app/src/main/java/com/freepass/vpn
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/assets

          cat > settings.gradle << 'EOF'
          rootProject.name = "FreePass"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.4' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          EOF

          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.freepass.vpn'
              compileSdk 34
              defaultConfig {
                  applicationId "com.freepass.vpn"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:allowBackup="true"
                  android:label="FreePass"
                  android:theme="@style/AppTheme">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/freepass/vpn/MainActivity.java << 'EOF'
          package com.freepass.vpn;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  WebView webView = findViewById(R.id.webView);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  webView.loadUrl("file:///android_asset/index.html");
              }
          }
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
              <WebView android:id="@+id/webView"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"/>
          </LinearLayout>
          EOF

          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar"/>
          </resources>
          EOF

          cat > app/src/main/assets/index.html << 'HTMLEOF'
          <!DOCTYPE html><html><head><meta charset="UTF-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>FreePass VPN</title>
          <style>
          *{margin:0;padding:0;box-sizing:border-box}
          body{background:#060a0f;color:#c8d8e8;font-family:sans-serif}
          .header{padding:20px;text-align:center;border-bottom:1px solid #1a2f4a}
          .logo{font-size:32px;font-weight:bold;color:#00d4ff;letter-spacing:4px}
          .sub{font-size:12px;color:#00ff88;letter-spacing:2px;margin-top:4px}
          .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px}
          .stat{background:#0d1520;border:1px solid #1a2f4a;border-radius:8px;padding:12px;text-align:center}
          .stat-num{font-size:24px;font-weight:bold}
          .stat-label{font-size:10px;color:#4a6080;margin-top:2px}
          .btn{display:block;margin:8px 12px;padding:14px;border-radius:8px;border:none;font-size:16px;font-weight:bold;cursor:pointer}
          .btn-check{background:transparent;border:1px solid #00d4ff;color:#00d4ff}
          .btn-copy{background:transparent;border:1px solid #00ff88;color:#00ff88}
