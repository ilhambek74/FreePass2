          .sub-card.fail{border-left-color:#ff3366;opacity:.6}
          .sub-name{font-size:14px;font-weight:bold;color:#fff}
          .sub-url{font-size:9px;color:#4a6080;margin-top:2px;word-break:break-all}
          .badge{float:right;font-size:11px;padding:2px 8px;border-radius:4px}
          .ok-b{background:rgba(0,255,136,.1);color:#00ff88}
          .fail-b{background:rgba(255,51,102,.1);color:#ff3366}
          .idle-b{background:rgba(74,96,128,.2);color:#4a6080}
          .log{background:#030608;border:1px solid #1a2f4a;border-radius:8px;margin:12px;padding:10px;font-size:10px;font-family:monospace;max-height:120px;overflow-y:auto}
